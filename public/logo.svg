      <stop stop-color="#0F1614"/>
      <stop offset="1" stop-color="#070B0A"/>
    </linearGradient>
    <linearGradient id="mint" x1="200" y1="160" x2="820" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B8FFE0"/>
